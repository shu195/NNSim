name: Bug Report
description: File a bug report for nnsim
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Summary
      description: Clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Include exact commands and input options.
      placeholder: |
        1. Run command ...
        2. Observe output ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Python version:
        - nnsim version:
    validations:
      required: true
